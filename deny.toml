# cargo-deny configuration (DESIGN.md §10): advisories / licenses / bans,
# checked in CI on every push and PR. Run locally with `cargo deny check`.

[licenses]
# Every current dependency satisfies this set: crates licensed
# "A OR B" pass if either arm is allowed.
allow = ["MIT", "Apache-2.0", "Unicode-3.0"]

[bans]
# Duplicate versions of the same crate bloat the tree but aren't a
# correctness problem for a binary-only workspace — surface, don't fail.
multiple-versions = "warn"

[advisories]
# Defaults: RustSec vulnerabilities are errors; unmaintained/unsound
# advisories warn.

[sources]
# Defaults: crates.io only; any git or alternate-registry source is an error.
