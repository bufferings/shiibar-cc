# CI: the same checks CLAUDE.md lists as the local commands, on every push
# and PR, plus the supply-chain checks DESIGN.md §10 requires from the
# start (--locked enforces the committed Cargo.lock; cargo-deny covers
# advisories / licenses / bans via deny.toml).
#
# The build/test job needs macOS: the app build (swift build) and swift
# test require it, and GitHub's macOS images ship the full Xcode that
# swift test needs. The pinned Rust toolchain comes from
# rust-toolchain.toml — rustup installs it automatically on the first
# cargo invocation. cargo-deny runs as a separate Linux job because the
# official action is a Docker action (Linux-only) and the check is
# platform-independent.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    # Rust + Swift builds and tests normally finish well under 15 minutes;
    # 30 leaves headroom for cold caches without letting a hang run for
    # GitHub's 6-hour default.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Rust tests
        run: cargo test --workspace --locked

      - name: Clippy (warning-free)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: App build
        run: swift build
        working-directory: app

      - name: App tests
        run: swift test
        working-directory: app

      - name: Cask template check (brew style --cask)
        # Renders packaging/homebrew/shiibar-cc.rb with dummy placeholder
        # values and runs it through `brew style --cask` so a Ruby syntax
        # error in the template fails CI immediately, instead of only
        # surfacing when bump-cask.yml renders it for real on a release
        # (macos-15 runners ship Homebrew preinstalled). `brew style --cask`
        # requires the cask to live inside a tap directory, so this renders
        # into a throwaway one under Homebrew's own Taps directory.
        run: |
          tapdir="$(brew --repository)/Library/Taps/bufferings/homebrew-shiibar-cc-ci"
          mkdir -p "$tapdir/Casks"
          dummy_sha256="$(printf 'x%.0s' {1..64})"
          sed \
            -e "s/{{VERSION}}/0.0.0/g" \
            -e "s/{{SHA256}}/$dummy_sha256/g" \
            packaging/homebrew/shiibar-cc.rb \
            > "$tapdir/Casks/shiibar-cc.rb"
          brew style --cask "$tapdir/Casks/shiibar-cc.rb"

  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: cargo-deny (advisories / licenses / bans)
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
